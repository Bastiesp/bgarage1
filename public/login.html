<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login BGarage</title><link rel="stylesheet" href="/styles.css"></head><body class="auth"><main class="auth-card"><div class="auth-logo"><span class="wrench-logo">🔧</span><h1>BGarage</h1></div><p>CRM para taller mecánico</p><form id="loginForm"><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Contraseña" required><button>Ingresar</button></form><a href="/register.html">Crear primer usuario</a><div id="msg"></div></main><script>document.getElementById('loginForm').onsubmit=async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok){msg.textContent=j.error||'Error';return}localStorage.setItem('token',j.token);localStorage.setItem('user',JSON.stringify(j.user));location.href='/';}</script></body></html>
