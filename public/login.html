<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login BGarage</title><link rel="stylesheet" href="/styles.css"></head><body class="auth"><main class="auth-card"><div class="auth-logo"><span class="wrench-logo">🔧</span><h1>BGarage</h1></div><p>CRM para taller mecánico</p><form id="loginForm"><label class="input-icon"><span>✉️</span><input name="email" type="email" placeholder="Correo" required></label><label class="input-icon password-field"><span>🔑</span><input id="passwordInput" name="password" type="password" placeholder="Contraseña" required><button type="button" class="eye-btn" onclick="togglePass()" aria-label="Mostrar contraseña">👁️</button></label><button>Ingresar</button></form><p class="auth-note">Registro cerrado temporalmente. Solo el administrador puede habilitar nuevos usuarios.</p><div id="msg"></div><div class="created-by">Creado por <b>Bastiesp</b></div></main><script>function togglePass(){const p=document.getElementById('passwordInput');p.type=p.type==='password'?'text':'password';}document.getElementById('loginForm').onsubmit=async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok){msg.textContent=j.error||'Error';return}localStorage.setItem('token',j.token);localStorage.setItem('user',JSON.stringify(j.user));location.href='/';}</script></body></html>
