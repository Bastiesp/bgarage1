<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Registro BGarage</title><link rel="stylesheet" href="/styles.css"></head><body class="auth"><main class="auth-card"><div class="auth-logo"><span class="wrench-logo">🔧</span><h1>BGarage</h1></div><h2>Crear cuenta</h2><p>El registro está cerrado por defecto después del primer usuario. Para crear otro usuario debes habilitarlo desde Render o usar un código de invitación.</p><form id="regForm"><input name="name" placeholder="Nombre" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Contraseña mínimo 8 caracteres" required><input name="registrationCode" placeholder="Código de invitación opcional"><button>Registrar</button></form><a href="/login.html">Volver al login</a><div id="msg"></div><div class="created-by">Creado por <b>Bastiesp</b></div></main><script>document.getElementById('regForm').onsubmit=async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok){msg.textContent=j.error||'Error';return}localStorage.setItem('token',j.token);localStorage.setItem('user',JSON.stringify(j.user));location.href='/';}</script></body></html>
