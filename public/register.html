<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Registro BGarage</title><link rel="stylesheet" href="/styles.css"></head><body class="auth"><main class="auth-card"><h1>Crear cuenta</h1><p>Usa el email definido en ADMIN_EMAIL para crear el admin.</p><form id="regForm"><input name="name" placeholder="Nombre" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Contraseña mínimo 8 caracteres" required><button>Registrar</button></form><a href="/login.html">Volver al login</a><div id="msg"></div></main><script>document.getElementById('regForm').onsubmit=async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target));const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok){msg.textContent=j.error||'Error';return}localStorage.setItem('token',j.token);localStorage.setItem('user',JSON.stringify(j.user));location.href='/';}</script></body></html>
